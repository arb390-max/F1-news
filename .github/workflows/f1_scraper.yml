name: F1 News Scraper

on:
  schedule:
    # Runs every 6 hours — adjust cron as needed
    - cron: "0 */6 * * *"
  workflow_dispatch: # allow manual trigger from GitHub UI

permissions:
  contents: write  # needed to commit scraped output back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout repository
      # -----------------------------------------------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Set up Python
      # -----------------------------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # -----------------------------------------------------------------------
      # 3. Install dependencies
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # 4. Ensure docs/ exists with .gitkeep so Git always tracks the folder
      # -----------------------------------------------------------------------
      - name: Prepare docs folder
        run: |
          mkdir -p docs
          touch docs/.gitkeep

      # -----------------------------------------------------------------------
      # 5. Run scraper — writes docs/index.md and docs/latest_news.json
      # -----------------------------------------------------------------------
      - name: Run F1 RSS scraper
        run: python f1_scraper.py

      # -----------------------------------------------------------------------
      # 6. Commit & push — only if something changed
      # -----------------------------------------------------------------------
      - name: Commit scraped output
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/.gitkeep docs/index.md docs/latest_news.json
          git diff --cached --quiet || \
            git commit -m "chore: update F1 news [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
