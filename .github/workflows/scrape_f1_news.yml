name: Scrape F1 News

on:
  schedule:
    # Runs every hour at :00
    - cron: "0 * * * *"
  workflow_dispatch: # allow manual trigger from the Actions tab

permissions:
  contents: write # needed to push docs/f1_news.json to main

jobs:
  scrape:
    name: Fetch & publish F1 RSS data
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout main branch ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      # ── 2. Set up Python ─────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # ── 3. Install dependencies ───────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Run scraper ────────────────────────────────────────────────────────
      - name: Run F1 RSS scraper
        run: python scrape_f1_news.py

      # ── 5. Commit & push docs/f1_news.json if changed ────────────────────────
      - name: Commit updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/f1_news.json
          # Only commit when there are actual changes
          git diff --cached --quiet || git commit -m "chore: update F1 news feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"

      - name: Push to main
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
